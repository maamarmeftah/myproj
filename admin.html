<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لوحة الإدارة السحابية</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-firestore-compat.js"></script>
    <style>
        body { font-family: 'Tajawal'; background: #f0f2f5; padding: 20px; }
        .section { background: white; padding: 25px; border-radius: 12px; margin-bottom: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        input, button { padding: 10px; margin: 5px 0; border-radius: 5px; border: 1px solid #ddd; width: 100%; }
        button { background: #27ae60; color: white; cursor: pointer; font-weight: bold; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border-bottom: 1px solid #eee; padding: 12px; text-align: right; }
        .status-pending { color: #f39c12; font-weight: bold; }
        .status-done { color: #27ae60; font-weight: bold; }
    </style>
</head>
<body>

    <h1>لوحة التحكم الاحترافية</h1>

    <div class="section">
        <h2>➕ إضافة منتج جديد</h2>
        <input type="text" id="p-name" placeholder="اسم المنتج">
        <input type="number" id="p-price" placeholder="السعر">
        <input type="file" id="p-image" accept="image/*">
        <button onclick="uploadProduct()">رفع المنتج للمتجر</button>
    </div>

    <div class="section">
        <h2>📦 الطلبات الواردة من العالم</h2>
        <table>
            <thead>
                <tr>
                    <th>العميل</th>
                    <th>المنتجات</th>
                    <th>المبلغ</th>
                    <th>الحالة</th>
                    <th>إجراء</th>
                </tr>
            </thead>
            <tbody id="orders-body"></tbody>
        </table>
    </div>

    <script>
        // ضع نفس بيانات FirebaseConfig هنا أيضاً
        const firebaseConfig = { /* بياناتك هنا */ };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // نظام حماية بسيط
        const pass = prompt("كلمة مرور الإدارة:");
        if(pass !== "123") { alert("خطأ"); document.body.innerHTML = "غير مسموح"; }

        // رفع المنتج بصورة
        async function uploadProduct() {
            const name = document.getElementById('p-name').value;
            const price = document.getElementById('p-price').value;
            const file = document.getElementById('p-image').files[0];
            if(!name || !file) return alert("أكمل البيانات");

            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onloadend = async () => {
                await db.collection("products").add({
                    name, price: parseInt(price), image: reader.result
                });
                alert("تم الرفع!");
                location.reload();
            };
        }

        // مراقبة الطلبات لايف
        db.collection("orders").onSnapshot(snap => {
            const body = document.getElementById('orders-body');
            body.innerHTML = "";
            snap.forEach(doc => {
                const o = doc.data();
                body.innerHTML += `
                    <tr>
                        <td>${o.customerName}<br><small>${o.customerPhone}</small></td>
                        <td>${o.products}</td>
                        <td>${o.total} ر.س</td>
                        <td class="${o.status === 'تم الشحن' ? 'status-done' : 'status-pending'}">${o.status}</td>
                        <td><button style="width:auto" onclick="shipOrder('${doc.id}')">شحن</button></td>
                    </tr>
                `;
            });
        });

        async function shipOrder(id) {
            await db.collection("orders").doc(id).update({ status: "تم الشحن" });
        }
    </script>
</body>
</html>
